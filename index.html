<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Relais IA</title>
  <script src="./firebase-config.js"></script>
  <style>
    :root{
      --text:#fff;--muted:#e4def7;--soft:#c8c0df;--cyan:#25dfff;--blue:#229cff;--violet:#a74cff;--pink:#e148ff;--green:#19f0d0;--line:rgba(190,145,255,.32);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;min-height:100%;font-family:Inter,Segoe UI,Roboto,Arial,sans-serif;color:var(--text)}
    body{background:radial-gradient(circle at 14% 0%,rgba(147,111,255,.74),transparent 310px),radial-gradient(circle at 92% 0%,rgba(165,88,255,.58),transparent 330px),linear-gradient(180deg,#7258c4 0%,#443080 17%,#24184b 38%,#080a20 100%)}
    button,input,textarea,select{font-family:inherit} button{cursor:pointer}
    .app{width:min(100%,480px);margin:0 auto;padding:32px 14px 34px;min-height:100vh}
    header{display:grid;grid-template-columns:118px 1fr;gap:16px;align-items:center;margin-bottom:22px;padding-top:4px}
    .brand-mark{position:relative;width:112px;height:112px;display:flex;align-items:center;justify-content:center}
    .orbit{position:absolute;inset:6px;border-radius:50%;border:2px solid rgba(190,78,255,.96);box-shadow:0 0 25px rgba(169,75,255,.78), inset 0 0 26px rgba(35,184,255,.19)}
    .orbit:before{content:"";position:absolute;inset:4px;border-radius:50%;border-top:3px solid rgba(44,218,255,.95);border-left:2px solid rgba(44,218,255,.44);border-bottom:2px solid rgba(202,71,255,.75);filter:drop-shadow(0 0 10px #17cfff)}
    .orbit:after{content:"";position:absolute;left:-4px;top:39px;width:45px;height:2px;background:linear-gradient(90deg,transparent,#2ddcff,#b84dff,transparent);box-shadow:0 0 12px #23cfff}
    .mini{position:absolute;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;background:rgba(12,15,45,.96);border:1px solid rgba(102,211,255,.86);box-shadow:0 0 12px rgba(37,206,255,.68);z-index:3;color:#fff}.mini.bell{top:0;left:43px}.mini.user{left:0;top:43px}.mini.team{right:0;top:43px;border-color:rgba(226,73,255,.92);box-shadow:0 0 12px rgba(226,73,255,.66)}.mini.check{bottom:0;left:43px}
    .r-core{z-index:2;font-size:86px;font-weight:1000;font-style:italic;line-height:1;background:linear-gradient(135deg,#fff 0%,#f8f5ff 22%,#46dfff 44%,#6a5cff 62%,#ff55f2 100%);-webkit-background-clip:text;background-clip:text;color:transparent;-webkit-text-stroke:1px rgba(255,255,255,.34);text-shadow:0 0 12px rgba(255,255,255,.55),0 0 24px rgba(47,214,255,.72),0 0 34px rgba(179,74,255,.72);transform:skewX(-10deg) scaleX(1.08)}
    .brand-title{font-size:42px;font-weight:1000;letter-spacing:2px;line-height:.9;text-transform:uppercase;background:linear-gradient(180deg,#fff 0%,#f4f1ff 35%,#79e6ff 67%,#dc4dff 100%);-webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:0 0 16px rgba(184,84,255,.28);white-space:nowrap}.tagline{font-size:11px;color:#fff;opacity:.92;letter-spacing:.35px;margin-top:11px;font-weight:850}.cloud{grid-column:2/3;color:var(--green);font-size:13px;font-weight:850;margin-top:-7px;text-shadow:0 0 12px rgba(0,255,220,.30)}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:24px}.stat{border:1px solid rgba(150,127,255,.37);background:linear-gradient(180deg,rgba(255,255,255,.09),rgba(16,18,48,.48));border-radius:18px;min-height:129px;padding:15px 7px;display:flex;flex-direction:column;align-items:center;justify-content:space-between;box-shadow:inset 0 0 24px rgba(142,88,255,.10);color:white}.stat:active{border-color:rgba(196,77,255,.9);box-shadow:0 0 18px rgba(178,78,255,.28),inset 0 0 28px rgba(178,78,255,.11)}.stat-ico{font-size:29px;filter:drop-shadow(0 0 9px currentColor)}.stat:nth-child(1) .stat-ico{color:#20c7ff}.stat:nth-child(2) .stat-ico{color:#ec4cff}.stat:nth-child(3) .stat-ico{color:#28a3ff}.stat:nth-child(4) .stat-ico{color:#b543ff}.stat-label{font-size:12px;color:#ebeafe;text-transform:uppercase;font-weight:850}.stat-num{font-size:34px;font-weight:1000;color:#fff;text-shadow:0 2px 12px rgba(255,255,255,.22)}
    .panel{border:1px solid var(--line);border-radius:25px;background:linear-gradient(180deg,rgba(45,35,96,.70),rgba(13,14,38,.88));box-shadow:0 18px 50px rgba(0,0,0,.28),inset 0 0 46px rgba(107,75,165,.20);padding:22px 18px;margin-bottom:20px}.panel-head{display:flex;gap:13px;align-items:center;margin-bottom:24px}.plus-ring{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:600;color:#dca4ff;border:3px solid #b552ff;box-shadow:0 0 16px rgba(181,82,255,.45), inset 0 0 15px rgba(44,195,255,.12)}.head-text{min-width:0}.title{font-size:25px;line-height:1.05;font-weight:1000;letter-spacing:.8px;text-transform:uppercase;background:linear-gradient(90deg,#22bdff,#865dff,#e54dff);-webkit-background-clip:text;background-clip:text;color:transparent}.subtitle{color:#fff;font-size:14px;margin-top:8px;line-height:1.25}.field{margin-bottom:21px}.label{font-weight:900;font-size:15px;margin-bottom:10px}input,textarea,select{width:100%;border:1px solid rgba(159,151,205,.33);border-radius:17px;background:rgba(3,5,20,.60);color:#fff;padding:17px 16px;font-size:16px;outline:none}textarea{min-height:112px;resize:vertical}input::placeholder,textarea::placeholder{color:#a9a6bc}
    .category-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px}.cat-card{height:84px;border-radius:15px;border:1px solid rgba(129,152,255,.34);background:rgba(12,16,42,.36);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#b7dfff;font-weight:850;font-size:12px;gap:7px;box-shadow:inset 0 0 22px rgba(50,150,255,.08)}.cat-card .cat-ico{font-size:29px;filter:drop-shadow(0 0 9px currentColor)}.cat-card:nth-child(2),.cat-card:nth-child(4){border-color:rgba(198,84,255,.39);color:#ee79ff}.cat-card.active{border-color:#c451ff;box-shadow:0 0 18px rgba(196,81,255,.30),inset 0 0 28px rgba(196,81,255,.12)}
    .priority{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.pill{height:54px;border-radius:17px;border:1px solid rgba(151,151,196,.33);background:rgba(255,255,255,.045);color:#f0eefc;font-weight:950;font-size:14px}.pill.active{border-color:#c451ff;box-shadow:0 0 15px rgba(196,81,255,.30);background:rgba(123,65,194,.16)}.select-wrap{position:relative}.select-wrap:after{content:'⌄';position:absolute;right:18px;top:50%;transform:translateY(-58%);font-size:28px;color:white;pointer-events:none}select{appearance:none;-webkit-appearance:none}.cta{margin-top:8px;width:100%;border:0;border-radius:20px;padding:22px 12px;font-size:19px;font-weight:1000;color:#fff;letter-spacing:.7px;background:linear-gradient(90deg,#842dff,#9e35ff,#cf25f8);box-shadow:0 0 24px rgba(185,42,255,.42)}.cta:disabled{opacity:.55}
    .list-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:18px}.icon-btn{border:0;background:transparent;color:white;font-size:31px;line-height:1;padding:4px 8px}.list-center{text-align:center;flex:1}.view-title{font-size:24px;font-weight:1000;text-transform:uppercase;background:linear-gradient(90deg,#2aa8ff,#e14dff);-webkit-background-clip:text;background-clip:text;color:transparent}.search-row{display:grid;grid-template-columns:1fr 50px;gap:12px;margin-bottom:18px}.filter-btn{border:1px solid rgba(159,151,205,.33);border-radius:17px;background:rgba(255,255,255,.05);color:white;font-size:23px}.task{border:1px solid rgba(151,151,196,.27);background:rgba(12,16,42,.42);border-radius:18px;padding:15px;margin-top:13px}.task-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.task-title{font-weight:950;font-size:16px;line-height:1.25}.badge{font-size:12px;font-weight:950;padding:8px 10px;border-radius:13px;border:1px solid rgba(255,255,255,.12);white-space:nowrap}.urgent{color:#ff5968;border-color:rgba(255,65,80,.60);background:rgba(255,60,80,.09)}.important,.normal{color:#f0c9ff;border-color:rgba(170,100,255,.55);background:rgba(120,70,190,.13)}.task-desc{color:#d8d7ee;margin-top:8px;font-size:13px;line-height:1.35}.task-meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;color:#c5c6df;font-size:12px}.status{margin-left:auto;font-weight:1000;text-transform:uppercase}.st-todo{color:#e253ff}.st-progress{color:#229cff}.st-done{color:#12edc4}.empty{color:#eceafa;text-align:center;padding:32px 0}.state-btn{border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.06);color:white;border-radius:12px;padding:9px 12px;font-weight:900}.toast{position:fixed;left:50%;top:18px;transform:translateX(-50%);width:min(92vw,440px);background:rgba(17,13,44,.96);border:1px solid rgba(197,81,255,.75);box-shadow:0 0 30px rgba(197,81,255,.35);border-radius:18px;padding:14px 16px;z-index:5;font-weight:900;display:none}.toast.show{display:block}.bottom-space{height:24px}
    @media(max-width:390px){.app{padding-top:24px}.brand-title{font-size:30px}.brand-mark{width:88px;height:88px}.r-core{font-size:68px}header{grid-template-columns:92px 1fr}.stats{gap:8px}.stat{min-height:114px}.category-grid{gap:8px}.cat-card{height:76px;font-size:11px}.title{font-size:22px}.panel{padding:20px 16px}}
  </style>
</head>
<body>
  <div class="toast" id="toast"></div>
  <main class="app">
    <header>
      <div class="brand-mark" aria-label="Relais IA logo">
        <div class="orbit"></div><div class="mini bell">🔔</div><div class="mini user">♙</div><div class="mini team">♚</div><div class="mini check">✓</div><div class="r-core">R</div>
      </div>
      <div><div class="brand-title">RELAIS IA</div><div class="tagline">CRÉEZ. PARTAGEZ. NOTIFIEZ. RÉALISEZ ENSEMBLE.</div></div>
      <div class="cloud" id="cloudStatus">Initialisation...</div>
    </header>
    <section class="stats">
      <button class="stat" data-filter="all"><div class="stat-ico">▦</div><div class="stat-label">Total</div><div class="stat-num" id="totalCount">0</div></button>
      <button class="stat" data-filter="À faire"><div class="stat-ico">▣</div><div class="stat-label">À faire</div><div class="stat-num" id="todoCount">0</div></button>
      <button class="stat" data-filter="En cours"><div class="stat-ico">⟳</div><div class="stat-label">En cours</div><div class="stat-num" id="progressCount">0</div></button>
      <button class="stat" data-filter="Terminé"><div class="stat-ico">✓</div><div class="stat-label">Terminé</div><div class="stat-num" id="doneCount">0</div></button>
    </section>
    <section class="panel" id="createPanel">
      <div class="panel-head"><div class="plus-ring">＋</div><div class="head-text"><div class="title">Créer une intervention</div><div class="subtitle">La catégorie concernée reçoit une notification interne.</div></div></div>
      <div class="field"><div class="label">Catégories à notifier</div><div class="category-grid" id="categoryCards">
        <button class="cat-card" data-category="Maintenance"><span class="cat-ico">🔧</span><span>Maintenance</span></button>
        <button class="cat-card" data-category="Propreté"><span class="cat-ico">🧹</span><span>Propreté</span></button>
        <button class="cat-card" data-category="Réception"><span class="cat-ico">🛎️</span><span>Réception</span></button>
        <button class="cat-card" data-category="Direction"><span class="cat-ico">👔</span><span>Direction</span></button>
      </div></div>
      <div class="field"><div class="label">Titre de la tâche</div><input id="title" placeholder="Ex : Vérifier la climatisation du cottage M02" /></div>
      <div class="field"><div class="label">Description</div><textarea id="description" placeholder="Décrivez clairement l'action à réaliser..."></textarea></div>
      <div class="field"><div class="label">Priorité</div><div class="priority"><button class="pill active" data-priority="Normal">Normal</button><button class="pill" data-priority="Important">Important</button><button class="pill" data-priority="Urgent">Urgent</button></div></div>
      <div class="field"><div class="label">Catégories à notifier</div><div class="select-wrap"><select id="category"><option value="Toutes les catégories">Toutes les catégories</option><option>Maintenance</option><option>Propreté</option><option>Réception</option><option>Direction</option></select></div></div>
      <button class="cta" id="createBtn">CRÉER ET NOTIFIER</button>
    </section>
    <section class="panel" id="listPanel" style="display:none">
      <div class="list-head"><button class="icon-btn" id="backCreate">←</button><div class="list-center"><div class="view-title" id="listTitle">TOTAL</div><div class="subtitle" id="listSub">Toutes les interventions</div></div><button class="icon-btn" id="closeList">×</button></div>
      <div class="search-row"><input id="search" placeholder="Rechercher..." /><button class="filter-btn">⌁</button></div>
      <div id="taskList"></div>
    </section>
    <div class="bottom-space"></div>
  </main>
<script>
(function(){
  const $=id=>document.getElementById(id);
  const cfg=window.RELAIS_IA_FIREBASE_CONFIG||null;
  const key='relais_ia_tasks_v10_1';
  let tasks=[], cloud=false, db=null, fb=null, priority='Normal', selectedCategory='Toutes les catégories', currentFilter='all';
  const icons={Maintenance:'🔧',Propreté:'🧹',Réception:'🛎️',Direction:'👔','Toutes les catégories':'▦'};
  const toast=(t)=>{const el=$('toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2800)};
  const esc=s=>String(s??'').replace(/[&<>\"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
  const fmt=v=>{try{if(v?.toDate)return v.toDate().toLocaleString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});return v?new Date(v).toLocaleString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}):'À l’instant'}catch(e){return 'À l’instant'}};
  function saveLocal(){localStorage.setItem(key,JSON.stringify(tasks))}
  function loadLocal(){try{tasks=JSON.parse(localStorage.getItem(key)||'[]')}catch(e){tasks=[]}}
  function setCounts(){ $('totalCount').textContent=tasks.length; $('todoCount').textContent=tasks.filter(t=>(t.status||'À faire')==='À faire').length; $('progressCount').textContent=tasks.filter(t=>t.status==='En cours').length; $('doneCount').textContent=tasks.filter(t=>t.status==='Terminé').length; }
  function renderList(){setCounts(); const list=$('taskList'); const q=($('search')?.value||'').toLowerCase(); let items=currentFilter==='all'?tasks:tasks.filter(t=>(t.status||'À faire')===currentFilter); if(q)items=items.filter(t=>`${t.title||''} ${t.description||''} ${t.category||''}`.toLowerCase().includes(q)); if(!items.length){list.innerHTML='<div class="empty">Aucune intervention dans cette vue.</div>';return} list.innerHTML=items.map(t=>{const st=t.status||'À faire'; const stClass=st==='Terminé'?'st-done':st==='En cours'?'st-progress':'st-todo'; const id=String(t.id).replace(/'/g,''); return `<div class="task"><div class="task-top"><div class="task-title"><span style="color:#3badff">●</span> ${esc(t.title||'Sans titre')}</div><span class="badge ${(t.priority||'Normal').toLowerCase()}">${esc(t.priority||'Normal')}</span></div><div class="task-desc"><span style="color:#69d4ff">${icons[t.category]||'▦'}</span> ${esc(t.category||'Toutes les catégories')}</div><div class="task-meta"><span>▣ ${fmt(t.createdAt)}</span><span>♙ ${esc(t.createdBy||'Utilisateur')}</span><span class="status ${stClass}">${esc(st)}</span></div><div class="task-meta"><button class="state-btn" onclick="window.nextStatus('${id}')">Changer état</button></div></div>`}).join('')}
  function openList(filter){currentFilter=filter;$('createPanel').style.display='none';$('listPanel').style.display='block';const map={all:['TOTAL','Toutes les interventions'],'À faire':['À FAIRE','Interventions à faire'],'En cours':['EN COURS','Interventions en cours'],'Terminé':['TERMINÉ','Interventions terminées']};$('listTitle').textContent=map[filter][0];$('listSub').textContent=map[filter][1];renderList();window.scrollTo({top:0,behavior:'smooth'})}
  window.nextStatus=async(id)=>{const t=tasks.find(x=>String(x.id)===String(id)); if(!t)return; const next=(t.status||'À faire')==='À faire'?'En cours':t.status==='En cours'?'Terminé':'À faire'; if(cloud&&fb){try{await fb.updateDoc(fb.doc(db,'interventions',id),{status:next,updatedAt:fb.serverTimestamp()});return}catch(e){console.error(e);toast('Erreur Firebase. Modification locale.')}} t.status=next;saveLocal();renderList();setCounts();};
  function bindUI(){document.querySelectorAll('.pill').forEach(b=>b.onclick=()=>{document.querySelectorAll('.pill').forEach(x=>x.classList.remove('active'));b.classList.add('active');priority=b.dataset.priority});document.querySelectorAll('.cat-card').forEach(b=>b.onclick=()=>{document.querySelectorAll('.cat-card').forEach(x=>x.classList.remove('active'));b.classList.add('active');selectedCategory=b.dataset.category;$('category').value=selectedCategory});$('category').onchange=e=>{selectedCategory=e.target.value;document.querySelectorAll('.cat-card').forEach(x=>x.classList.toggle('active',x.dataset.category===selectedCategory))};document.querySelectorAll('.stat').forEach(b=>b.onclick=()=>openList(b.dataset.filter));$('backCreate').onclick=$('closeList').onclick=()=>{$('listPanel').style.display='none';$('createPanel').style.display='block'};$('search').oninput=renderList;$('createBtn').onclick=createTask;}
  async function createTask(){const title=$('title').value.trim(); if(!title){toast('Ajoute un titre pour créer l’intervention.');return} const task={title,description:$('description').value.trim(),priority,category:selectedCategory,status:'À faire',createdBy:'Utilisateur',createdAt:cloud&&fb?fb.serverTimestamp():new Date().toISOString()};$('createBtn').disabled=true;try{if(cloud&&fb){await fb.addDoc(fb.collection(db,'interventions'),task)}else{task.id=String(Date.now());tasks.unshift(task);saveLocal();setCounts();if($('listPanel').style.display!=='none')renderList()}$('title').value='';$('description').value='';toast('Intervention créée et notifiée.')}catch(e){console.error(e);task.id=String(Date.now());task.createdAt=new Date().toISOString();tasks.unshift(task);saveLocal();setCounts();toast('Firebase indisponible : intervention créée en local.')}finally{$('createBtn').disabled=false}}
  async function initFirebase(){if(!(cfg&&cfg.apiKey&&cfg.appId)){throw new Error('Config Firebase absente')} const appMod=await import('https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js'); const fs=await import('https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js'); const app=appMod.initializeApp(cfg); db=fs.getFirestore(app); fb=fs; cloud=true; $('cloudStatus').textContent='Cloud Firebase connecté · temps réel actif'; const q=fs.query(fs.collection(db,'interventions'),fs.orderBy('createdAt','desc')); fs.onSnapshot(q,(snap)=>{const before=tasks.length; tasks=snap.docs.map(d=>({id:d.id,...d.data()})); setCounts(); if($('listPanel').style.display!=='none')renderList(); if(before&&tasks.length>before)toast('Nouvelle intervention reçue.')},(err)=>{console.error(err);$('cloudStatus').textContent='Cloud connecté · lecture limitée';});}
  bindUI(); loadLocal(); setCounts(); $('cloudStatus').textContent='Mode local · Firebase en cours de connexion'; initFirebase().catch(e=>{console.warn(e);cloud=false;$('cloudStatus').textContent='Mode local · Firebase non configuré';});
})();
</script>
</body>
</html>
